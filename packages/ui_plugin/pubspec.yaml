name: ui_plugin
description: Generic UI surface plugin for dart_monty — modals, toasts, forms, and inline messages.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  dart_monty:
    git:
      url: https://github.com/runyaga/dart_monty.git
      ref: feat/repl-platform
  meta: ^1.9.0
  signals_core: ^6.2.0

dev_dependencies:
  test: ^1.24.0
  very_good_analysis: ^10.0.0
