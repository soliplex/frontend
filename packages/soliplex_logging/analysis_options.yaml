include: package:very_good_analysis/analysis_options.yaml

linter:
  rules:
    public_member_api_docs: false

dcm:
  extends:
    - recommended
  metrics:
    cyclomatic-complexity:
      threshold: 10
    lines-of-code:
      threshold: 40
    number-of-parameters:
      threshold: 5
    maximum-nesting-level:
      threshold: 3
