include: package:very_good_analysis/analysis_options.6.0.0.yaml

analyzer:
  exclude:
    # Generated files from quicktype - maintained in backend repo
    - lib/src/schema/agui_features/*

linter:
  rules:
    public_member_api_docs: true

dcm:
  extends:
    - recommended
  metrics:
    cyclomatic-complexity:
      threshold: 10
    lines-of-code:
      threshold: 40
    number-of-parameters:
      threshold: 5
    maximum-nesting-level:
      threshold: 3
