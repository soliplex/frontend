name: soliplex_client
description: Pure Dart client for Soliplex backend HTTP and AG-UI APIs
version: 1.0.0-dev
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  ag_ui:
    git:
      url: https://github.com/soliplex/ag-ui.git
      path: sdks/community/dart
  collection: ^1.19.1
  http: ^1.2.0
  meta: ^1.9.0
  soliplex_logging:
    path: ../soliplex_logging

dev_dependencies:
  mocktail: ^1.0.0
  test: ^1.24.0
  very_good_analysis: ^10.0.0
