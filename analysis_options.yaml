include: package:flutter_lints/flutter.yaml

# TODO: remove these overrides after the SDK 3.10 lint cleanup commits.
# Both lints are dormant under SDK ^3.6.0 and activate under ^3.10.0
# (wildcard patterns and null-aware elements).
linter:
  rules:
    unnecessary_underscores: false
    use_null_aware_elements: false

dcm:
  extends:
    - recommended
  metrics:
    cyclomatic-complexity:
      threshold: 10
    lines-of-code:
      threshold: 40
    number-of-parameters:
      threshold: 5
    maximum-nesting-level:
      threshold: 3
