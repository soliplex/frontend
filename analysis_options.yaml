include: package:flutter_lints/flutter.yaml

# TODO: remove this override after the unnecessary_underscores cleanup.
# Lint is dormant under SDK ^3.6.0 and activates under ^3.10.0
# (wildcard patterns).
linter:
  rules:
    unnecessary_underscores: false

dcm:
  extends:
    - recommended
  metrics:
    cyclomatic-complexity:
      threshold: 10
    lines-of-code:
      threshold: 40
    number-of-parameters:
      threshold: 5
    maximum-nesting-level:
      threshold: 3
