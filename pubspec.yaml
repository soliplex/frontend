name: soliplex_frontend
description: Modular Flutter frontend framework for Soliplex
publish_to: none
# To update version, run:
# dart run tool/bump_version.dart <major|minor|patch|build>
version: 0.83.0+41

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

workspace:
  - packages/soliplex_agent
  - packages/soliplex_client
  - packages/soliplex_client_native
  - packages/soliplex_logging
  - packages/soliplex_monty_plugin
  - packages/ui_plugin
  - packages/ui_renderer_soliplex

dependencies:
  flutter:
    sdk: flutter
  flutter_appauth: ^12.0.0
  flutter_highlight: ^0.7.0
  flutter_markdown_plus: ^1.0.7
  flutter_markdown_plus_latex: ^1.0.5
  flutter_riverpod: ^3.1.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.17
  go_router: ^17.2.0
  markdown: ^7.0.0
  shared_preferences: ^2.5.5
  signals_flutter: ^6.3.0
  file_picker: ^11.0.0
  mime: ^2.0.0
  url_launcher: ^6.3.1
  web: ^1.1.1
  dart_monty_flutter:
    git:
      url: https://github.com/runyaga/dart_monty_core.git
      ref: main
      path: packages/dart_monty_flutter
  soliplex_agent:
    path: packages/soliplex_agent
  soliplex_monty_plugin:
    path: packages/soliplex_monty_plugin
  soliplex_client:
    path: packages/soliplex_client
  soliplex_client_native:
    path: packages/soliplex_client_native
  soliplex_logging:
    path: packages/soliplex_logging
  ui_plugin:
    path: packages/ui_plugin
  ui_renderer_soliplex:
    path: packages/ui_renderer_soliplex

dependency_overrides:
  dart_monty_core:
    git:
      url: https://github.com/runyaga/dart_monty_core.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.1
  mocktail: ^1.0.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
  image_path: "assets/branding/soliplex/app_icon_1024.png"
  adaptive_icon_background: "#424242"
  adaptive_icon_foreground: "assets/branding/soliplex/logo_1024.png"
  web_favicon_path: "assets/branding/soliplex/favicon_48.png"

flutter:
  uses-material-design: true
  assets:
    - assets/branding/soliplex/

flutter_native_splash:
  color: "#424242"
  image: assets/branding/soliplex/logo_1024.png
  android_12:
    image: assets/branding/soliplex/logo_splash_android12.png
    color: "#424242"
  web: true
